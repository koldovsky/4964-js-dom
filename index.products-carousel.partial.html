<section id="featured-products" class="products-carousel container" aria-label="Featured products carousel">
  <div class="products-carousel__header">
    <p class="products-carousel__eyebrow">Featured Picks</p>
    <h2 class="products-carousel__title">Browse Stickerz in Motion</h2>
  </div>
  <div class="products-carousel__content">
    <button
      class="products-carousel__control products-carousel__control--prev"
      type="button"
      aria-label="Show previous products"
    >
      <span aria-hidden="true">&larr;</span>
    </button>
    <div class="products-carousel__viewport">
      <div class="products-carousel__track"></div>
    </div>
    <button
      class="products-carousel__control products-carousel__control--next"
      type="button"
      aria-label="Show next products"
    >
      <span aria-hidden="true">&rarr;</span>
    </button>
  </div>
  <div class="products-carousel__indicators" aria-label="Select featured products slide"></div>
</section>
